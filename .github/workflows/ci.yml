name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm i -g pnpm@9.11.0
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm -r build
      - run: pnpm check:bundle
      - run: pnpm check:coldstart
      - run: pnpm check:tokens
      - run: pnpm check:dbqueries
